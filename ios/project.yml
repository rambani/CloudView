name: CloudView
options:
  bundleIdPrefix: com.cloudview
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: 8.0.0

targets:
  CloudView:
    type: application
    platform: iOS
    sources:
      - path: CloudView
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cloudview.app
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: CloudView/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_STRICT_CONCURRENCY: complete
        ENABLE_PREVIEWS: YES
        CODE_SIGN_ENTITLEMENTS: CloudView/CloudView.entitlements
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          XCCONFIG_FILE: Config.xcconfig
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          VALIDATE_PRODUCT: YES
          XCCONFIG_FILE: Config.xcconfig
    dependencies:
      - package: Supabase
      - package: Sentry
      - sdk: WeatherKit.framework
    scheme:
      testTargets:
        - CloudViewTests

  CloudViewTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CloudViewTests
    dependencies:
      - target: CloudView
    settings:
      base:
        SWIFT_VERSION: "5.9"
