name: Cloudoodle
options:
  bundleIdPrefix: com.cloudoodle
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: 8.0.0

targets:
  Cloudoodle:
    type: application
    platform: iOS
    sources:
      - path: Cloudoodle
        excludes:
          # Legal markdown is added explicitly below with buildPhase
          # resources so xcodegen doesn't classify them as "text" and
          # drop them from the bundle.
          - "Resources/Legal/*.md"
          # StoreKit configuration files are referenced from the Run
          # scheme (Edit Scheme → Options → StoreKit Configuration),
          # not the app bundle. xcodegen would otherwise add them to
          # Copy Bundle Resources where they'd ship dead weight.
          - "Resources/StoreKit/**"
      - path: Cloudoodle/Resources/Legal/PrivacyPolicy.md
        buildPhase: resources
      - path: Cloudoodle/Resources/Legal/TermsOfService.md
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cloudoodle.app
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: Cloudoodle/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_STRICT_CONCURRENCY: complete
        ENABLE_PREVIEWS: YES
        CODE_SIGN_ENTITLEMENTS: Cloudoodle/Cloudoodle.entitlements
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          XCCONFIG_FILE: Config.xcconfig
          CODE_SIGN_ENTITLEMENTS: Cloudoodle/Cloudoodle.entitlements
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          VALIDATE_PRODUCT: YES
          XCCONFIG_FILE: Config.xcconfig
          CODE_SIGN_ENTITLEMENTS: Cloudoodle/Cloudoodle.Release.entitlements
    dependencies:
      - package: Supabase
      - package: Sentry
      - sdk: WeatherKit.framework
    scheme:
      testTargets:
        - CloudoodleTests

  CloudoodleTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CloudoodleTests
    dependencies:
      - target: Cloudoodle
    settings:
      base:
        SWIFT_VERSION: "5.9"
