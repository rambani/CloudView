name: Backend uptime

# Vendor-free uptime monitor. Pings /api/health every 15 minutes (the
# minimum GitHub Actions cron interval). If the endpoint returns
# anything other than 200, the workflow fails — GitHub emails repo
# collaborators on the first failure of a previously-green workflow,
# which is the cheapest possible "you broke prod" alert.
#
# To get richer alerting (Slack, Discord, PagerDuty), add a webhook
# secret and a curl POST step at the end. Intentionally not in this
# file so it's vendor-agnostic by default.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    name: Health check
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: GET /api/health
        env:
          HEALTH_URL: https://cloud-view-backend.vercel.app/api/health
        run: |
          set -e
          echo "Pinging $HEALTH_URL"
          status=$(curl -sS -o /tmp/body.json -w "%{http_code}" --max-time 30 "$HEALTH_URL")
          echo "HTTP $status"
          cat /tmp/body.json
          if [ "$status" != "200" ]; then
            echo "::error::Backend health check returned $status"
            exit 1
          fi
          # Health endpoint reports redis status in its JSON body; surface
          # a degraded-but-not-failed Redis as a warning so it's visible
          # in the run log without breaking the CI build.
          if ! grep -q '"redis":"connected"' /tmp/body.json; then
            echo "::warning::Redis not reporting connected in health payload"
          fi
