<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cloudoodle · Design Canvas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    html, body, #root { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    body { font-family: 'Geist', -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    *, *::before, *::after { box-sizing: border-box; }
    @keyframes cv-draw { to { stroke-dashoffset: 0; } }
    @keyframes cv-scan-move {
      0%   { top: 18%; opacity: 0; }
      12%  { opacity: 1; }
      80%  { top: 78%; opacity: 1; }
      100% { top: 78%; opacity: 0; }
    }
    .cv-scan-line { animation: cv-scan-move 3.2s cubic-bezier(0.4,0,0.2,1) infinite; }
    @keyframes cv-bbox-fade {
      0%, 30% { opacity: 0; transform: scale(0.94); }
      50%, 100% { opacity: 1; transform: scale(1); }
    }
    .cv-bbox { animation: cv-bbox-fade 3.2s ease infinite; }
    @keyframes cv-prog {
      0% { width: 0%; }
      100% { width: 100%; }
    }
    .cv-progress { animation: cv-prog 3.2s linear infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback, useContext, useLayoutEffect } = React;

    // ─── Tweaks panel ──────────────────────────────────────────────────────────

    const __TWEAKS_STYLE = `
      .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
        max-height:calc(100vh - 32px);display:flex;flex-direction:column;
        transform:scale(var(--dc-inv-zoom,1));transform-origin:bottom right;
        background:rgba(250,249,247,.78);color:#29261b;
        -webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);
        border:.5px solid rgba(255,255,255,.6);border-radius:14px;
        box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);
        font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
      .twk-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 8px 10px 14px;cursor:move;user-select:none}
      .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
      .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
      .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
      .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;overflow-x:hidden;min-height:0;scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}
      .twk-body::-webkit-scrollbar{width:8px}
      .twk-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px;border:2px solid transparent;background-clip:content-box}
      .twk-row{display:flex;flex-direction:column;gap:5px}
      .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
      .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;color:rgba(41,38,27,.72)}
      .twk-lbl>span:first-child{font-weight:500}
      .twk-val{color:rgba(41,38,27,.5);font-variant-numeric:tabular-nums}
      .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(41,38,27,.45);padding:10px 0 0}
      .twk-sect:first-child{padding-top:0}
      .twk-field{appearance:none;box-sizing:border-box;width:100%;min-width:0;height:26px;padding:0 8px;border:.5px solid rgba(0,0,0,.1);border-radius:7px;background:rgba(255,255,255,.6);color:inherit;font:inherit;outline:none}
      .twk-field:focus{border-color:rgba(0,0,0,.25);background:rgba(255,255,255,.85)}
      select.twk-field{padding-right:22px;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='rgba(0,0,0,.5)' d='M0 0h10L5 6z'/></svg>");background-repeat:no-repeat;background-position:right 8px center}
      .twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;background:rgba(0,0,0,.06);user-select:none}
      .twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);transition:left .15s cubic-bezier(.3,.7,.4,1),width .15s}
      .twk-seg.dragging .twk-seg-thumb{transition:none}
      .twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;background:transparent;color:inherit;font:inherit;font-weight:500;min-height:22px;border-radius:6px;cursor:default;padding:4px 6px;line-height:1.2;overflow-wrap:anywhere}
    `;

    function useTweaks(defaults) {
      const [values, setValues] = useState(defaults);
      const setTweak = useCallback((keyOrEdits, val) => {
        const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
          ? keyOrEdits : { [keyOrEdits]: val };
        setValues((prev) => ({ ...prev, ...edits }));
      }, []);
      return [values, setTweak];
    }

    function TweaksPanel({ title = 'Tweaks', children }) {
      const [open, setOpen] = useState(false);
      const dragRef = useRef(null);
      const offsetRef = useRef({ x: 16, y: 16 });
      const PAD = 16;

      const clampToViewport = useCallback(() => {
        const panel = dragRef.current;
        if (!panel) return;
        const w = panel.offsetWidth, h = panel.offsetHeight;
        const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
        const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
        offsetRef.current = {
          x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
          y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
        };
        panel.style.right = offsetRef.current.x + 'px';
        panel.style.bottom = offsetRef.current.y + 'px';
      }, []);

      useEffect(() => {
        if (!open) return;
        clampToViewport();
        const ro = new ResizeObserver(clampToViewport);
        ro.observe(document.documentElement);
        return () => ro.disconnect();
      }, [open, clampToViewport]);

      const onDragStart = (e) => {
        const panel = dragRef.current;
        if (!panel) return;
        const r = panel.getBoundingClientRect();
        const sx = e.clientX, sy = e.clientY;
        const startRight = window.innerWidth - r.right;
        const startBottom = window.innerHeight - r.bottom;
        const move = (ev) => {
          offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
          clampToViewport();
        };
        const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', up);
      };

      return (
        <>
          <style>{__TWEAKS_STYLE}</style>
          <button onClick={() => setOpen(o => !o)} style={{
            position: 'fixed', right: 16, bottom: open ? 'auto' : 16,
            zIndex: 2147483647, background: 'rgba(250,249,247,0.92)',
            border: '0.5px solid rgba(255,255,255,0.6)', borderRadius: 10,
            padding: '7px 14px', fontSize: 11.5, fontWeight: 600, color: '#29261b',
            cursor: 'default', backdropFilter: 'blur(20px)', WebkitBackdropFilter: 'blur(20px)',
            boxShadow: '0 4px 16px rgba(0,0,0,0.15)', display: open ? 'none' : 'block', letterSpacing: '0.03em',
          }}>✦ Tweaks</button>
          {open && (
            <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
              <div className="twk-hd" onMouseDown={onDragStart}>
                <b>{title}</b>
                <button className="twk-x" onMouseDown={(e) => e.stopPropagation()} onClick={() => setOpen(false)}>✕</button>
              </div>
              <div className="twk-body">{children}</div>
            </div>
          )}
        </>
      );
    }

    function TweakSection({ label }) { return <div className="twk-sect">{label}</div>; }

    function TweakRow({ label, value, children, inline = false }) {
      return (
        <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
          <div className="twk-lbl">
            <span>{label}</span>
            {value != null && <span className="twk-val">{value}</span>}
          </div>
          {children}
        </div>
      );
    }

    function TweakRadio({ label, value, options, onChange }) {
      const trackRef = useRef(null);
      const [dragging, setDragging] = useState(false);
      const valueRef = useRef(value);
      valueRef.current = value;

      const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
      const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
      const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);

      if (!fitsAsSegments) {
        return (
          <TweakRow label={label}>
            <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
              {options.map((o) => { const v = typeof o === 'object' ? o.value : o; const l = typeof o === 'object' ? o.label : o; return <option key={v} value={v}>{l}</option>; })}
            </select>
          </TweakRow>
        );
      }

      const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
      const idx = Math.max(0, opts.findIndex((o) => o.value === value));
      const n = opts.length;

      const segAt = (clientX) => {
        const r = trackRef.current.getBoundingClientRect();
        const inner = r.width - 4;
        const i = Math.floor(((clientX - r.left - 2) / inner) * n);
        return opts[Math.max(0, Math.min(n - 1, i))].value;
      };

      const onPointerDown = (e) => {
        setDragging(true);
        const v0 = segAt(e.clientX);
        if (v0 !== valueRef.current) onChange(v0);
        const move = (ev) => { if (!trackRef.current) return; const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); };
        const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
        window.addEventListener('pointermove', move);
        window.addEventListener('pointerup', up);
      };

      return (
        <TweakRow label={label}>
          <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
            <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
            {opts.map((o) => <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>)}
          </div>
        </TweakRow>
      );
    }

    // ─── Design tokens ─────────────────────────────────────────────────────────

    const CV_THEMES = {
      airy:      { name: 'Airy',      bg: '#F6F7F9', surface: '#FFFFFF',  ink: '#0B1220', inkSoft: 'rgba(11,18,32,0.62)',  inkMute: 'rgba(11,18,32,0.42)',  line: 'rgba(11,18,32,0.08)',  lineSoft: 'rgba(11,18,32,0.05)',  accent: 'oklch(0.62 0.13 230)', accentSoft: 'oklch(0.94 0.04 230)', warm: 'oklch(0.78 0.12 60)',  warmSoft: 'oklch(0.96 0.04 60)',  chipBg: '#EEF0F4', dark: false },
      editorial: { name: 'Editorial', bg: '#F2EFE8', surface: '#FBF8F1',  ink: '#1A1612', inkSoft: 'rgba(26,22,18,0.6)',   inkMute: 'rgba(26,22,18,0.4)',   line: 'rgba(26,22,18,0.1)',   lineSoft: 'rgba(26,22,18,0.06)',  accent: 'oklch(0.55 0.14 35)',  accentSoft: 'oklch(0.93 0.04 35)',  warm: 'oklch(0.68 0.12 80)', warmSoft: 'oklch(0.94 0.05 80)', chipBg: '#EAE5DA', dark: false },
      dusk:      { name: 'Dusk',      bg: '#0B1018', surface: '#141B27',  ink: '#F4F6FA', inkSoft: 'rgba(244,246,250,0.65)',inkMute: 'rgba(244,246,250,0.42)',line: 'rgba(244,246,250,0.1)', lineSoft: 'rgba(244,246,250,0.06)',accent: 'oklch(0.74 0.13 250)', accentSoft: 'oklch(0.32 0.08 250)', warm: 'oklch(0.78 0.13 50)', warmSoft: 'oklch(0.35 0.08 50)', chipBg: '#1C2433', dark: true  },
      dreamy:    { name: 'Dreamy',    bg: '#F4EEF7', surface: '#FFFFFF',  ink: '#251A30', inkSoft: 'rgba(37,26,48,0.62)',  inkMute: 'rgba(37,26,48,0.4)',   line: 'rgba(37,26,48,0.08)',  lineSoft: 'rgba(37,26,48,0.05)',  accent: 'oklch(0.7 0.13 320)',  accentSoft: 'oklch(0.94 0.04 320)', warm: 'oklch(0.82 0.1 70)',  warmSoft: 'oklch(0.95 0.04 70)', chipBg: '#ECE2F1', dark: false },
    };

    function CVCloudShape({ variant = 'puffy', fill = '#fff', opacity = 0.92 }) {
      const shapes = {
        puffy:   'M30 60 Q15 60 14 46 Q14 30 30 30 Q34 16 50 16 Q60 6 76 14 Q88 6 102 16 Q120 14 124 32 Q140 30 142 46 Q142 60 126 60 Z',
        long:    'M20 56 Q8 56 8 44 Q8 32 22 32 Q30 22 48 24 Q60 14 78 22 Q96 16 110 26 Q128 22 142 32 Q160 28 174 36 Q188 36 188 50 Q188 60 174 60 Z',
        cluster: 'M40 64 Q20 64 22 48 Q14 42 22 32 Q28 22 42 26 Q50 12 70 18 Q86 8 102 22 Q120 18 124 36 Q140 34 142 50 Q150 62 132 64 Z',
        wispy:   'M14 40 Q10 32 22 30 Q30 22 46 28 Q60 18 78 26 Q100 22 110 32 Q126 30 134 40 Q146 40 146 50 Q146 56 134 56 Q120 60 100 54 Q80 60 60 52 Q40 58 24 50 Q14 50 14 40 Z',
        tower:   'M28 70 Q14 68 16 54 Q8 44 18 36 Q14 22 30 22 Q36 8 56 12 Q70 0 82 14 Q98 8 100 26 Q116 24 116 42 Q128 42 128 56 Q132 70 116 70 Z',
      };
      return <path d={shapes[variant] || shapes.puffy} fill={fill} opacity={opacity} />;
    }

    function CVSkyPhoto({ mood = 'day', children, style = {} }) {
      const moods = {
        day:    { grad: 'linear-gradient(180deg, #7CB7E5 0%, #B7DAF2 55%, #DCEDF7 100%)',
                  clouds: [{ variant: 'cluster', x: 6, y: 18, w: 58, op: 0.96 }, { variant: 'puffy', x: 52, y: 42, w: 44, op: 0.9 }, { variant: 'long', x: 0, y: 65, w: 60, op: 0.7 }, { variant: 'wispy', x: 50, y: 10, w: 36, op: 0.5 }] },
        golden: { grad: 'linear-gradient(180deg, #F4B27C 0%, #F6CC9C 40%, #FAE1C2 75%, #F8E9D4 100%)',
                  clouds: [{ variant: 'long', x: 4, y: 32, w: 70, op: 0.88, fill: '#FFF6E8' }, { variant: 'cluster', x: 40, y: 52, w: 50, op: 0.9, fill: '#FBD4A8' }, { variant: 'wispy', x: 0, y: 70, w: 60, op: 0.7, fill: '#F2A968' }] },
        dusk:   { grad: 'linear-gradient(180deg, #2A3654 0%, #4A4368 35%, #826388 70%, #C68A82 100%)',
                  clouds: [{ variant: 'long', x: 0, y: 40, w: 80, op: 0.7, fill: '#3A4368' }, { variant: 'cluster', x: 35, y: 60, w: 56, op: 0.75, fill: '#5B526E' }, { variant: 'wispy', x: 8, y: 25, w: 50, op: 0.5, fill: '#E8B89F' }] },
        stormy: { grad: 'linear-gradient(180deg, #4A5566 0%, #6A7585 50%, #8A95A5 100%)',
                  clouds: [{ variant: 'tower', x: 8, y: 18, w: 60, op: 0.85, fill: '#2F3845' }, { variant: 'cluster', x: 45, y: 35, w: 55, op: 0.78, fill: '#3F4858' }, { variant: 'long', x: 0, y: 70, w: 70, op: 0.6, fill: '#5A6575' }] },
        dawn:   { grad: 'linear-gradient(180deg, #B8C8E8 0%, #E0CDD8 45%, #F4D9C8 80%, #F8E4D2 100%)',
                  clouds: [{ variant: 'puffy', x: 10, y: 30, w: 50, op: 0.88 }, { variant: 'long', x: 35, y: 50, w: 65, op: 0.75, fill: '#FBE0D4' }, { variant: 'wispy', x: 5, y: 70, w: 55, op: 0.55, fill: '#F4C9B0' }] },
      };
      const m = moods[mood] || moods.day;
      return (
        <div style={{ position: 'relative', overflow: 'hidden', background: m.grad, ...style }}>
          <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none" style={{ position: 'absolute', inset: 0, display: 'block' }}>
            {m.clouds.map((c, i) => (
              <g key={i} transform={`translate(${c.x},${c.y}) scale(${c.w / 200},${c.w / 200})`}>
                <CVCloudShape variant={c.variant} fill={c.fill || '#FFFFFF'} opacity={c.op} />
              </g>
            ))}
          </svg>
          <div style={{ position: 'absolute', inset: 0, mixBlendMode: 'overlay', opacity: 0.18, pointerEvents: 'none', backgroundImage: "url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/></svg>\")" }} />
          {children}
        </div>
      );
    }

    const CV_DRAWINGS = {
      dragon:    { label: 'a dragon',       paths: ['M12 70 C 25 55, 38 75, 48 60 S 70 40, 84 50','M84 50 q 6 -4 10 -2 q 2 2 0 6 q -2 4 -8 4','M88 53 m -1 0 a 1 1 0 1 0 2 0 a 1 1 0 1 0 -2 0','M50 58 q 6 -18 22 -16 q -8 6 -10 16','M14 70 l -3 4 M18 68 l -2 5 M22 66 l -1 5'] },
      whale:     { label: 'a whale',        paths: ['M18 62 q 0 -22 30 -22 q 30 0 36 18 q -4 6 -12 6 q -28 4 -54 -2 z','M14 60 q -6 -6 -10 -14 q 6 0 14 8','M70 54 m -1 0 a 1 1 0 1 0 2 0 a 1 1 0 1 0 -2 0','M64 58 q 4 3 10 1','M44 38 q -2 -8 2 -16 M50 38 q 0 -8 4 -14 M56 38 q 2 -8 8 -12'] },
      dog:       { label: 'a sleepy pup',   paths: ['M30 56 q 0 -20 22 -20 q 22 0 22 20 q 0 12 -22 12 q -22 0 -22 -12 z','M30 46 q -8 -2 -10 8 q 4 4 12 0','M74 46 q 8 -2 10 8 q -4 4 -12 0','M42 52 q 3 2 6 0','M58 52 q 3 2 6 0','M48 60 q 4 4 8 0','M52 58 v 2'] },
      castle:    { label: 'a tiny castle',  paths: ['M20 70 L 20 50 L 26 50 L 26 44 L 32 44 L 32 50 L 38 50 L 38 38 L 50 38 L 50 50 L 56 50 L 56 44 L 62 44 L 62 50 L 68 50 L 68 70 Z','M50 38 L 50 26','M50 26 L 60 30 L 50 32 Z','M42 70 L 42 60 q 2 -4 4 -4 q 2 0 4 4 L 50 70','M28 56 h 4 v 4 h -4 z','M60 56 h 4 v 4 h -4 z'] },
      heart:     { label: 'a soft heart',   paths: ['M50 76 C 20 60, 14 36, 30 28 C 42 22, 50 32, 50 38 C 50 32, 58 22, 70 28 C 86 36, 80 60, 50 76 Z'] },
      spaceship: { label: 'a parked UFO',   paths: ['M18 56 q 16 -10 36 -10 q 20 0 36 10 q -16 8 -36 8 q -20 0 -36 -8 z','M40 46 q 0 -14 20 -14 q 20 0 20 14','M24 58 m -1 0 a 1 1 0 1 0 2 0 a 1 1 0 1 0 -2 0','M40 60 m -1 0 a 1 1 0 1 0 2 0 a 1 1 0 1 0 -2 0','M56 60 m -1 0 a 1 1 0 1 0 2 0 a 1 1 0 1 0 -2 0','M72 60 m -1 0 a 1 1 0 1 0 2 0 a 1 1 0 1 0 -2 0','M50 64 L 44 84 M50 64 L 56 84 M50 64 L 50 84'] },
    };

    function cvStrokeProps(aiStyle, t) {
      switch (aiStyle) {
        case 'bold':   return { stroke: t.accent, strokeWidth: 2.6, strokeDasharray: 'none', fill: 'none' };
        case 'dotted': return { stroke: '#FFFFFF', strokeWidth: 1.6, strokeDasharray: '0.1 3', strokeLinecap: 'round', fill: 'none' };
        case 'marker': return { stroke: 'rgba(255,255,255,0.95)', strokeWidth: 3.6, strokeLinecap: 'round', strokeLinejoin: 'round', fill: 'none', filter: 'url(#cv-rough)' };
        default:       return { stroke: '#FFFFFF', strokeWidth: 1.8, strokeLinecap: 'round', strokeLinejoin: 'round', fill: 'none' };
      }
    }

    function CVAIOverlay({ drawing = 'dragon', aiStyle = 'thin', animate = false, theme, opacity = 1 }) {
      const d = CV_DRAWINGS[drawing] || CV_DRAWINGS.dragon;
      const sp = cvStrokeProps(aiStyle, theme);
      const shadow = aiStyle === 'bold' ? 'drop-shadow(0 1px 2px rgba(0,0,0,0.25))' : 'drop-shadow(0 1px 3px rgba(0,0,0,0.45))';
      return (
        <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', opacity, pointerEvents: 'none', filter: shadow }}>
          <defs><filter id="cv-rough"><feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" /><feDisplacementMap in="SourceGraphic" scale="1.2" /></filter></defs>
          {d.paths.map((p, i) => (
            <path key={i} d={p} {...sp} style={animate ? { strokeDasharray: 220, strokeDashoffset: 220, animation: `cv-draw 1.8s ${i * 0.15}s cubic-bezier(0.65,0,0.35,1) forwards` } : {}} />
          ))}
          {aiStyle === 'dotted' && d.paths.map((p, i) => <circle key={'c' + i} r="1.2" fill="#FFFFFF" cx={20 + i * 12} cy={50 + (i % 2) * 6} opacity="0.9" />)}
        </svg>
      );
    }

    const CVIcon = {

          <div style={{ padding: '0 60px 36px' }}>
            <div style={{ fontSize: 28, fontWeight: 600, color: 'rgba(40,30,20,0.85)', letterSpacing: -0.4, marginBottom: 6 }}>{title}</div>
            {subtitle && <div style={{ fontSize: 16, color: 'rgba(60,50,40,0.6)' }}>{subtitle}</div>}
          </div>
          <div style={{ display: 'flex', gap: 48, padding: '0 60px', overflowX: 'auto', paddingBottom: 32 }}>
            {children}
          </div>
        </div>
      );
    }

    function Artboard({ label, width, height, children }) {
      return (
        <div style={{ flexShrink: 0 }}>
          <div style={{ marginBottom: 8, fontSize: 13, fontWeight: 500, color: 'rgba(60,50,40,0.7)' }}>{label}</div>
          <div style={{ width, height, borderRadius: 2, boxShadow: '0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06)', overflow: 'hidden', background: '#fff' }}>
            {children}
          </div>
        </div>
      );
    }

    // ─── App ───────────────────────────────────────────────────────────────────

    function App() {
      const [t, setTweak] = useTweaks({ theme: 'airy', aiStyle: 'thin', quipTone: 'witty' });
      const theme = CV_THEMES[t.theme] || CV_THEMES.airy;
      const common = { theme, aiStyle: t.aiStyle, quipTone: t.quipTone };

      return (
        <>
          <div style={{ minHeight: '100vh', background: '#f0eee9', overflowY: 'auto', overflowX: 'hidden', fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif' }}>
            {/* Canvas header */}
            <div style={{ padding: '48px 60px 0', marginBottom: 60 }}>
              <div style={{ fontFamily: '"JetBrains Mono", monospace', fontSize: 11, letterSpacing: 2, textTransform: 'uppercase', color: 'rgba(60,50,40,0.6)', marginBottom: 12 }}>Cloudoodle · Design Canvas · v1</div>
              <div style={{ fontFamily: '"Instrument Serif", serif', fontSize: 48, lineHeight: 0.95, letterSpacing: -1.5, color: 'rgba(40,30,20,0.85)', maxWidth: 560 }}>
                Look up.<br/><span style={{ fontStyle: 'italic' }}>Find</span> what&rsquo;s up.
              </div>
              <div style={{ marginTop: 18, fontSize: 15, lineHeight: 1.5, color: 'rgba(60,50,40,0.65)', maxWidth: 480 }}>
                All 11 screens · pan and scroll to explore · use Tweaks to switch theme, AI overlay, and quip tone.
              </div>
            </div>

            <Section id="onboarding" title="01 · Onboarding" subtitle="First impression · setup">
              <Artboard label="Welcome" width={402} height={874}><CVScreenWelcome {...common} /></Artboard>
              <Artboard label="Permissions" width={402} height={874}><CVScreenPermissions {...common} /></Artboard>
            </Section>

            <Section title="02 · The scan" subtitle="The hero flow · capture → analyze → reveal">
              <Artboard label="A · Viewfinder" width={402} height={874}><CVScreenCapture {...common} /></Artboard>
              <Artboard label="B · Scanning (live)" width={402} height={874}><CVScreenScanning {...common} /></Artboard>
              <Artboard label="C · Result · dragon" width={402} height={874}><CVScreenResult {...common} drawing="dragon" /></Artboard>
              <Artboard label="C · Result · whale" width={402} height={874}><CVScreenResult {...common} drawing="whale" /></Artboard>
              <Artboard label="C · Result · castle" width={402} height={874}><CVScreenResult {...common} drawing="castle" /></Artboard>
            </Section>

            <Section title="03 · Today" subtitle="Daily home · what the city is seeing right now">
              <Artboard label="Home" width={402} height={874}><CVScreenHome {...common} /></Artboard>
            </Section>

            <Section title="04 · The city" subtitle="Aggregated finds across New York">
              <Artboard label="Feed" width={402} height={874}><CVScreenFeed {...common} /></Artboard>
              <Artboard label="Map" width={402} height={874}><CVScreenMap {...common} /></Artboard>
            </Section>

            <Section title="05 · Step outside" subtitle="Lock-screen nudge when the sky gets good">
              <Artboard label="Lock screen push" width={402} height={874}><CVScreenNotification {...common} /></Artboard>
            </Section>

            <Section title="06 · You" subtitle="Personal scrapbook · streaks · badges">
              <Artboard label="Scrapbook" width={402} height={874}><CVScreenCollection {...common} /></Artboard>
              <Artboard label="Profile" width={402} height={874}><CVScreenProfile {...common} /></Artboard>
            </Section>

            <div style={{ height: 80 }} />
          </div>

          <TweaksPanel title="Cloudoodle · Tweaks">
            <TweakSection label="Aesthetic" />
            <TweakRadio label="Theme" value={t.theme} onChange={(v) => setTweak('theme', v)}
              options={[{ value: 'airy', label: 'Airy' }, { value: 'editorial', label: 'Editorial' }, { value: 'dusk', label: 'Dusk' }, { value: 'dreamy', label: 'Dreamy' }]} />
            <TweakSection label="AI overlay" />
            <TweakRadio label="Drawing" value={t.aiStyle} onChange={(v) => setTweak('aiStyle', v)}
              options={[{ value: 'thin', label: 'Thin sketch' }, { value: 'bold', label: 'Bold outline' }, { value: 'dotted', label: 'Constellation' }, { value: 'marker', label: 'Marker' }]} />
            <TweakSection label="Voice" />
            <TweakRadio label="Quip tone" value={t.quipTone} onChange={(v) => setTweak('quipTone', v)}
              options={[{ value: 'witty', label: 'Witty' }, { value: 'whimsical', label: 'Whimsical' }, { value: 'punny', label: 'Punny' }]} />
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
